<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>motes — procedural, pointer-reactive ASCII backgrounds</title>
    <meta
      name="description"
      content="Procedural, pointer-reactive ASCII backgrounds for the web. render(time, pointer). Drop-in for React and vanilla, zero runtime dependencies."
    />
    <!-- Relative only: this page never needs to know its own origin. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!--
      Started here rather than when the stylesheet is parsed. Paired with
      font-display: optional this is what makes the load shift-free: the
      browser picks one font for the page view and never swaps mid-view, and
      the preload is what makes the font it picks almost always Archivo.
    -->
    <link
      rel="preload"
      href="/fonts/archivo-latin-var.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="motes" />
    <meta
      property="og:description"
      content="Procedural, pointer-reactive ASCII backgrounds for the web."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
